services:
  - type: web
    name: butler-chat
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: butler-db
          property: connectionString

databases:
  - name: butler-db
    plan: free
    region: oregon
    databaseName: butler
    user: butler
